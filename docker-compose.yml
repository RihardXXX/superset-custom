# Custom (Centaur) — production-emulation stack for the customized
# Apache Superset 6.1.0 image.
#
#   nginx (clean URLs, :80)  ->  superset (gunicorn, :8088)
#                                superset-worker / -beat (Celery)
#                                postgres (metadata) + redis (cache/broker)
#
# Quick start:
#   docker compose up -d --build
#   open http://localhost            (login: admin / admin)
#
# Works with zero configuration. Copy .env.example to .env to override the
# secret key, DB credentials or the landing dashboard.

x-superset-env: &superset-env
  DATABASE_HOST: ${DATABASE_HOST:-postgres}
  DATABASE_PORT: ${DATABASE_PORT:-5432}
  DATABASE_USER: ${DATABASE_USER:-superset}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD:-superset}
  DATABASE_DB: ${DATABASE_DB:-superset}
  DATABASE_DIALECT: postgresql
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-centaur-demo-not-for-production-please-override-this-secret-key}
  PYTHONPATH: /app/pythonpath
  # Custom: dashboard (id or slug) used as the landing page for ALL users.
  # `world_health` is one of the example dashboards loaded by superset-init.
  DEFAULT_LANDING_DASHBOARD: ${DEFAULT_LANDING_DASHBOARD:-world_health}

x-superset-common: &superset-common
  build:
    context: .
    dockerfile: Dockerfile
    target: lean
  image: superset-custom:6.1.0
  environment: *superset-env
  volumes:
    - ./docker/superset_config_docker.py:/app/pythonpath/superset_config.py:ro
    - superset_home:/app/superset_home
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    container_name: superset_postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-superset}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-superset}
      POSTGRES_DB: ${DATABASE_DB:-superset}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-superset}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: superset_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # One-shot: DB migrations, admin user, roles/perms, example dashboards.
  superset-init:
    <<: *superset-common
    container_name: superset_init
    # Run the stock init (migrations, admin, roles, examples) then publish the
    # landing dashboard and share it with the Gamma role so non-admins can reach it.
    command:
      - bash
      - -c
      - "/app/docker/docker-init.sh && python /app/docker/init_landing.py"
    volumes:
      - ./docker/superset_config_docker.py:/app/pythonpath/superset_config.py:ro
      - ./docker/init_landing.py:/app/docker/init_landing.py:ro
      - superset_home:/app/superset_home
    environment:
      <<: *superset-env
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      SUPERSET_LOAD_EXAMPLES: ${SUPERSET_LOAD_EXAMPLES:-yes}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  # Web app (gunicorn).
  superset:
    <<: *superset-common
    container_name: superset_app
    command: ["/app/docker/docker-bootstrap.sh", "app-gunicorn"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      superset-init:
        condition: service_completed_successfully

  # Celery worker (async queries, thumbnails, alerts & reports).
  superset-worker:
    <<: *superset-common
    container_name: superset_worker
    command: ["/app/docker/docker-bootstrap.sh", "worker"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A superset.tasks.celery_app:app inspect ping -d celery@$$HOSTNAME | grep -q pong"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      superset-init:
        condition: service_completed_successfully

  # Celery beat (scheduled alerts & reports).
  superset-worker-beat:
    <<: *superset-common
    container_name: superset_worker_beat
    command: ["/app/docker/docker-bootstrap.sh", "beat"]
    healthcheck:
      disable: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      superset-init:
        condition: service_completed_successfully

  # Reverse proxy that serves the prefix-less URLs on port 80.
  nginx:
    image: nginx:1.27-alpine
    container_name: superset_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/superset.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      superset:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  superset_home:
