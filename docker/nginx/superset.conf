# Custom (Centaur) — production reverse proxy that removes the `/superset/`
# prefix from user-facing URLs.
#
# Strategy:
#   * The Superset Flask app still serves page handlers under `/superset/*`
#     (we did NOT move the whole blueprint to root, to avoid route collisions
#     with the clean ExploreView / SqlLabView / DashboardModelView routes).
#   * The frontend (routes.tsx + link builders) now emits prefix-less URLs.
#   * This proxy bridges the two: clean page URLs are internally rewritten to
#     `/superset/*` before hitting the app, and legacy `/superset/<page>` URLs
#     are 301-redirected to their clean form.
#   * Internal XHR endpoints (/superset/explore_json, /superset/log,
#     /superset/language_pack, /superset/api, ...) are passed through untouched.

upstream superset_app {
    server superset:8088;
    keep-alive 32;
}

server {
    listen 80;
    server_name _;

    # Allow large dashboards / uploads
    client_max_body_size 100M;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_read_timeout 300s;

    # ----- Passthrough exceptions (must win over the rewrite rules below) -----
    # /dashboard/list/ is a real prefix-less backend route (DashboardModelView);
    # it must NOT be rewritten to /superset/dashboard/list.
    location ^~ /dashboard/list {
        proxy_pass http://superset_app;
    }

    # ----- Canonical redirects: legacy /superset/<page> -> clean URL ----------
    # Page routes only; XHR endpoints under /superset/ are intentionally excluded.
    location ~ ^/superset/(dashboard/p|dashboard|welcome|all_entities|tags|slice|file-handler|explore/p)(/.*)?$ {
        return 301 /$1$2$is_args$args;
    }

    # ----- Clean page URLs -> internally rewritten to /superset/* -------------
    location ~ ^/(welcome|file-handler|all_entities|tags|slice|explore/p|dashboard/p)(/.*)?$ {
        rewrite ^/(.*)$ /superset/$1 break;
        proxy_pass http://superset_app;
    }

    # Dashboard detail page: /dashboard/<id-or-slug>/  (list already handled above)
    location ~ ^/dashboard/ {
        rewrite ^/(.*)$ /superset/$1 break;
        proxy_pass http://superset_app;
    }

    # ----- Everything else (/, /api, /static, /superset XHR, /explore,
    #       /sqllab, /chart, /login, /health, ...) -> straight passthrough ------
    location / {
        proxy_pass http://superset_app;
    }
}
